name: Deploy to Staging

on:
  repository_dispatch:
    types: [deploy-stage]  # Triggered by deploy-dev workflow
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to deploy (e.g., v1.2.3)'
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  deploy-stage:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    # environment: Staging

    steps:
      - name: Get Release Info
        id: release
        run: |
          if [[ "${{ github.event_name }}" == "repository_dispatch" ]]; then
            # From repository dispatch event
            RELEASE_TAG="${{ github.event.client_payload.release_tag }}"
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            # Manual trigger
            RELEASE_TAG="${{ inputs.release_tag }}"
          fi
          
          echo "tag=$RELEASE_TAG" >> $GITHUB_OUTPUT
          echo "artifact_url=${{ github.server_url }}/${{ github.repository }}/releases/download/${RELEASE_TAG}/github-action-release.tar.gz" >> $GITHUB_OUTPUT
          echo "manifest_url=${{ github.server_url }}/${{ github.repository }}/releases/download/${RELEASE_TAG}/deployment-manifest.json" >> $GITHUB_OUTPUT
          
          echo "🎯 Deploying to staging: $RELEASE_TAG"
      
      - name: Test Output
        run: |
          echo "Release Tag: ${{ steps.release.outputs.tag }}"
          echo "Artifact URL: ${{ steps.release.outputs.artifact_url }}"
          echo "Manifest URL: ${{ steps.release.outputs.manifest_url }}"
      
      - name: Save release info for downstream workflows
        run: |
          mkdir -p deployment-info
          echo "${{ steps.release.outputs.tag }}" > deployment-info/release-tag.txt
          echo "${{ steps.release.outputs.artifact_url }}" > deployment-info/artifact-url.txt
          echo "${{ steps.release.outputs.manifest_url }}" > deployment-info/manifest-url.txt
      
      - name: Upload deployment info
        uses: actions/upload-artifact@v4
        with:
          name: deployment-info-staging
          path: deployment-info/
          retention-days: 7