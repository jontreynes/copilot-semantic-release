name: Deploy to Staging

run-name: "${{ github.event.client_payload.release_tag || inputs.release_tag || 'triggered' }}"

on:
  repository_dispatch:
    types: [deploy-stage]  # Triggered by deploy-dev workflow
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to deploy (e.g., v1.2.3)'
        required: true
        type: string

jobs:
  get-release-tag:
    name: Determine Release Tag
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.get-tag.outputs.tag }}
    steps:
      - name: Get Release Tag
        id: get-tag
        run: |
          if [[ "${{ github.event_name }}" == "repository_dispatch" ]]; then
            echo "tag=${{ github.event.client_payload.release_tag }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "tag=${{ inputs.release_tag }}" >> $GITHUB_OUTPUT
          fi
  
  consolidate-changelog:
    name: Consolidate Changelog
    needs: get-release-tag
    uses: ./.github/workflows/consolidate-changelog.yml
    with:
      release_tag: ${{ needs.get-release-tag.outputs.release_tag }}
      environment: 'stage'
    secrets:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    permissions:
      contents: write
      actions: read
  
  approval:
    name: "Staging Deployment Approval (Manual Step)"
    runs-on: ubuntu-latest
    needs: [get-release-tag, consolidate-changelog]
    steps:
      - name: Approval checkpoint
        run: |
          echo "✅ Changelog consolidated for ${{ needs.get-release-tag.outputs.release_tag }}"
          echo "🔗 Review release notes: https://github.com/${{ github.repository }}/releases/tag/${{ needs.get-release-tag.outputs.release_tag }}"
          echo "✅ Ready to deploy to staging"
  
  deploy:
    name: Deploy
    needs: [get-release-tag, approval]
    uses: ./.github/workflows/deploy-template.yml
    with:
      environment: 'stage'
      release_tag: ${{ needs.get-release-tag.outputs.release_tag }}
      next_environment: 'prod'
    secrets: inherit
  
  mark-deployed:
    name: Mark Deployed
    needs: [get-release-tag, consolidate-changelog, deploy]
    uses: ./.github/workflows/mark-deployed.yml
    with:
      release_tag: ${{ needs.get-release-tag.outputs.release_tag }}
      environment: 'stage'
      old_version: ${{ needs.consolidate-changelog.outputs.old_version }}
      new_version: ${{ needs.consolidate-changelog.outputs.new_version }}
    permissions:
      contents: write