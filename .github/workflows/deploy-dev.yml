name: Deploy to Development

run-name: "${{ github.event.client_payload.release_tag || inputs.release_tag || 'triggered' }}"

on:
  repository_dispatch:
    types: [deploy-dev]  # Triggered by release workflow
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to deploy (e.g., v1.2.3)'
        required: true
        type: string

jobs:
  get-release-tag:
    name: Determine Release Tag
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.get-tag.outputs.tag }}
    steps:
      - name: Get Release Tag
        id: get-tag
        run: |
          if [[ "${{ github.event_name }}" == "repository_dispatch" ]]; then
            echo "tag=${{ github.event.client_payload.release_tag }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "tag=${{ inputs.release_tag }}" >> $GITHUB_OUTPUT
          fi
  
  deploy:
    name: Deploy
    needs: get-release-tag
    uses: ./.github/workflows/deploy-template.yml
    with:
      environment: 'dev'
      release_tag: ${{ needs.get-release-tag.outputs.release_tag }}
      # next_environment: 'stage'
      next_environment: '' #todo
    secrets: inherit
  
  promote-release:
    name: Promote Release to Prerelease
    needs: [get-release-tag, deploy]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Promote to prerelease
        run: |
          echo "📝 Promoting release to prerelease (visible, not latest)..."
          gh release edit "${{ needs.get-release-tag.outputs.release_tag }}" \
            --draft=false \
            --prerelease \
            --latest=false
          echo "✅ Release promoted to prerelease"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
