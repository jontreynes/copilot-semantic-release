name: Consolidate Changelog

on:
  workflow_call:
    inputs:
      release_tag:
        description: 'Release tag being deployed (e.g., v2.29.3)'
        required: true
        type: string
      environment:
        description: 'Target environment name (stage or prod)'
        required: true
        type: string

permissions:
  contents: write
  actions: read

jobs:
  consolidate-changelog:
    name: Consolidate Changelog for ${{ inputs.environment }}
    runs-on: ubuntu-latest
    environment: changelog-approval
    outputs:
      old_version: ${{ steps.consolidate.outputs.old_version }}
      new_version: ${{ steps.consolidate.outputs.new_version }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.release_tag }}  # Checkout the tag being deployed
          fetch-depth: 0  # Need full history for CHANGELOG.md parsing
      
      - name: Find last deployment to ${{ inputs.environment }}
        id: find-last-deployment
        run: |
          echo "🔍 Finding last successful deployment to ${{ inputs.environment }}..."
          
          # Determine workflow file based on environment
          if [[ "${{ inputs.environment }}" == "stage" ]]; then
            WORKFLOW_FILE="deploy-stage.yml"
          elif [[ "${{ inputs.environment }}" == "prod" ]]; then
            WORKFLOW_FILE="deploy-prod.yml"
          else
            echo "❌ Invalid environment: ${{ inputs.environment }}"
            exit 1
          fi
          
          # Query GitHub API for last successful deployment using curl
          echo "🔎 Querying API: /repos/${{ github.repository }}/actions/workflows/${WORKFLOW_FILE}/runs"
          
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/${WORKFLOW_FILE}/runs?status=success&per_page=1")
          
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          
          echo "📊 HTTP Status: $HTTP_CODE"
          
          if [[ "$HTTP_CODE" != "200" ]]; then
            echo "⚠️  API request failed (HTTP $HTTP_CODE) - assuming first deployment"
            echo "Response: $BODY"
            echo "old_version=" >> $GITHUB_OUTPUT
            echo "is_first_deployment=true" >> $GITHUB_OUTPUT
          else
            LAST_RUN=$(echo "$BODY" | jq -r '.workflow_runs[0] // empty')
            
            if [[ -z "$LAST_RUN" || "$LAST_RUN" == "null" ]]; then
              echo "ℹ️  No previous deployment found to ${{ inputs.environment }}"
              echo "old_version=" >> $GITHUB_OUTPUT
              echo "is_first_deployment=true" >> $GITHUB_OUTPUT
            else
              # Extract release tag from run name (run-name is set to release_tag)
              RUN_NAME=$(echo "$LAST_RUN" | jq -r '.name // empty')
              echo "🔍 Last run name: $RUN_NAME"
              
              # Extract version using sed (more compatible than grep -P)
              OLD_TAG=$(echo "$RUN_NAME" | sed -n 's/.*\(v[0-9]\+\.[0-9]\+\.[0-9]\+\(-[^[:space:]]*\)\?\).*/\1/p')
              
              if [[ -z "$OLD_TAG" ]]; then
                echo "⚠️  Could not extract version from last deployment"
                echo "⚠️  Run name was: $RUN_NAME"
                echo "old_version=" >> $GITHUB_OUTPUT
                echo "is_first_deployment=true" >> $GITHUB_OUTPUT
              else
                echo "✅ Last deployment to ${{ inputs.environment }}: $OLD_TAG"
                echo "old_version=$OLD_TAG" >> $GITHUB_OUTPUT
                echo "is_first_deployment=false" >> $GITHUB_OUTPUT
              fi
            fi
          fi

      
      - name: Extract changelog sections
        id: extract-changelog
        if: steps.find-last-deployment.outputs.old_version != ''
        run: |
          chmod +x .github/scripts/extract-changelog.sh
          
          .github/scripts/extract-changelog.sh \
            "${{ steps.find-last-deployment.outputs.old_version }}" \
            "${{ inputs.release_tag }}" \
            "/tmp/changelog_extract.md"
          
          # Output content for next step
          echo "extracted_content<<EOF" >> $GITHUB_OUTPUT
          cat /tmp/changelog_extract.md >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      
      - name: Gather contributors
        id: gather-contributors
        if: steps.find-last-deployment.outputs.old_version != ''
        run: |
          OLD_VERSION="${{ steps.find-last-deployment.outputs.old_version }}"
          NEW_VERSION="${{ inputs.release_tag }}"
          
          echo "🔍 Gathering contributors between $OLD_VERSION and $NEW_VERSION..."
          
          # Initialize contributors file
          > /tmp/contributors.txt
          
          # Get merge commits (PR merges) between the two tags
          pr_commits=$(git log "${OLD_VERSION}..${NEW_VERSION}" --oneline --merges 2>/dev/null || echo "")
          
          if [ -z "$pr_commits" ]; then
            echo "ℹ️  No merge commits found between $OLD_VERSION and $NEW_VERSION"
            exit 0
          fi
          
          # Extract PR numbers from merge commit messages
          pr_numbers=$(echo "$pr_commits" | grep -oP 'pull request #\K[0-9]+' | sort -u)
          
          if [ -z "$pr_numbers" ]; then
            echo "ℹ️  No PR numbers found in merge commits"
            exit 0
          fi
          
          contributors=()
          
          for pr_num in $pr_numbers; do
            api_response=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              "https://api.github.com/repos/${{ github.repository }}/pulls/$pr_num")
            
            if echo "$api_response" | jq -e . >/dev/null 2>&1; then
              error_msg=$(echo "$api_response" | jq -r '.message // empty' 2>/dev/null)
              if [ -z "$error_msg" ]; then
                pr_author=$(echo "$api_response" | jq -r '.user.login // empty' 2>/dev/null)
                if [ -n "$pr_author" ]; then
                  contributors+=("$pr_author")
                fi
              fi
            fi
          done
          
          # Write deduplicated, sorted contributors
          if [ ${#contributors[@]} -gt 0 ]; then
            printf '%s\n' "${contributors[@]}" | sort -u > /tmp/contributors.txt
            echo "✅ Found $(wc -l < /tmp/contributors.txt | tr -d ' ') unique contributor(s)"
          else
            echo "ℹ️  No contributors found"
          fi
      
      - name: Consolidate and update release notes
        id: consolidate
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NEW_VERSION="${{ inputs.release_tag }}"
          OLD_VERSION="${{ steps.find-last-deployment.outputs.old_version }}"
          IS_FIRST="${{ steps.find-last-deployment.outputs.is_first_deployment }}"
          ENVIRONMENT="${{ inputs.environment }}"
          
          echo "📦 Updating release notes for $NEW_VERSION..."
          
          # Get current release body
          CURRENT_BODY=$(gh release view "$NEW_VERSION" --json body -q .body 2>/dev/null || echo "")
          
          if [[ -z "$CURRENT_BODY" ]]; then
            echo "❌ Release $NEW_VERSION not found"
            exit 1
          fi
          
          # Determine version range label and raw changelog content
          DIFF_URL=""
          if [[ "$IS_FIRST" == "true" || -z "$OLD_VERSION" ]]; then
            VERSION_RANGE="Initial Deployment"
            OLD_VERSION="initial"
            RAW_CHANGELOG="This is the first deployment to ${ENVIRONMENT}."
          elif [[ "$OLD_VERSION" == "$NEW_VERSION" ]]; then
            VERSION_RANGE="Redeploying ${NEW_VERSION}"
            RAW_CHANGELOG="No new changes — redeploying ${NEW_VERSION}."
          else
            DIFF_URL="https://github.com/${{ github.repository }}/compare/${OLD_VERSION}...${NEW_VERSION}"
            VERSION_RANGE="[${OLD_VERSION} → ${NEW_VERSION}](${DIFF_URL})"
            RAW_CHANGELOG=$(cat /tmp/changelog_extract.md 2>/dev/null || echo "No changes extracted")
          fi

          # Format changelog as blockquote with downgraded headings so it renders
          # visually smaller/inset beneath the deployment history bullets
          CHANGELOG_CONTENT=$(printf '%s\n' "$RAW_CHANGELOG" | sed \
            -e 's/^### /##### /' \
            -e 's/^## /#### /' \
            -e 's/^# /### /' | \
          awk '{ if ($0 == "") print ">"; else print "> " $0 }')
          CHANGELOG_CONTENT=$(printf '> **Changes in this deployment:**\n>\n%s' "$CHANGELOG_CONTENT")

          # Build contributors section if available
          CONTRIBUTORS_SECTION=""
          if [[ -f /tmp/contributors.txt && -s /tmp/contributors.txt ]]; then
            CONTRIBUTORS_SECTION=$(printf '\n### 👥 Contributors\n\n'; sed 's/^/- @/' /tmp/contributors.txt; echo "")
          fi

          HISTORY_HEADER="## 📦 Deployment History"
          PENDING_LINE="- ⏳ Pending deployment to ${ENVIRONMENT} | ${VERSION_RANGE}"

          if echo "$CURRENT_BODY" | grep -q "^## 📦 Deployment History"; then
            echo "ℹ️  Existing deployment history found — preserving ✅ entries and appending new pending entry"

            # Extract semantic-release notes: everything before the --- + ## 📦 Deployment History block.
            # Blank lines after --- must be skipped or found_sep resets before the exit fires,
            # causing the history block to be included in SEMANTIC_NOTES (duplicate bug).
            SEMANTIC_NOTES=$(echo "$CURRENT_BODY" | awk '
              /^---$/ { found_sep=1; next }
              found_sep && /^[[:space:]]*$/ { next }
              found_sep && /^## 📦 Deployment History/ { exit }
              found_sep { found_sep=0 }
              { print }
            ' | sed -e '${/^[[:space:]]*$/d}')

            # Preserve all existing ✅ bullet lines
            EXISTING_CHECKS=$(echo "$CURRENT_BODY" | grep "^- ✅ " || true)

            # Write updated body: semantic notes + separator + history header + preserved ✅ + new ⏳ + changelog
            {
              printf '%s\n' "$SEMANTIC_NOTES"
              echo ""
              echo "---"
              echo ""
              echo "$HISTORY_HEADER"
              echo ""
              if [[ -n "$EXISTING_CHECKS" ]]; then
                echo "$EXISTING_CHECKS"
              fi
              echo "$PENDING_LINE"
              echo ""
              printf '%s\n' "$CHANGELOG_CONTENT"
              if [[ -n "$CONTRIBUTORS_SECTION" ]]; then
                printf '%s\n' "$CONTRIBUTORS_SECTION"
              fi
              if [[ -n "$DIFF_URL" ]]; then
                echo ""
                echo "**Full Changelog**: ${DIFF_URL}"
              fi
            } > /tmp/release_body.md
          else
            echo "ℹ️  No existing deployment history — creating new section"

            # Append history section to current body
            {
              printf '%s\n' "$CURRENT_BODY"
              echo ""
              echo "---"
              echo ""
              echo "$HISTORY_HEADER"
              echo ""
              echo "$PENDING_LINE"
              echo ""
              printf '%s\n' "$CHANGELOG_CONTENT"
              if [[ -n "$CONTRIBUTORS_SECTION" ]]; then
                printf '%s\n' "$CONTRIBUTORS_SECTION"
              fi
              if [[ -n "$DIFF_URL" ]]; then
                echo ""
                echo "**Full Changelog**: ${DIFF_URL}"
              fi
            } > /tmp/release_body.md
          fi
          
          # Update release notes
          gh release edit "$NEW_VERSION" --notes-file /tmp/release_body.md
          
          echo "✅ Release notes updated with pending deployment section"
          echo "old_version=$OLD_VERSION" >> $GITHUB_OUTPUT
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          
          # Output summary
          echo "### 📦 Changelog Consolidated" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment**: ${ENVIRONMENT}" >> $GITHUB_STEP_SUMMARY
          echo "**Version Range**: ${VERSION_RANGE}" >> $GITHUB_STEP_SUMMARY
          echo "**Status**: Pending Deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "[View Release Notes](https://github.com/${{ github.repository }}/releases/tag/${NEW_VERSION})" >> $GITHUB_STEP_SUMMARY
