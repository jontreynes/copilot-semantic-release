name: Consolidate Changelog

on:
  workflow_call:
    inputs:
      release_tag:
        description: 'Release tag being deployed (e.g., v2.29.3)'
        required: true
        type: string
      environment:
        description: 'Target environment name (stage or prod)'
        required: true
        type: string

permissions:
  contents: write
  actions: read

jobs:
  consolidate-changelog:
    name: Consolidate Changelog for ${{ inputs.environment }}
    runs-on: ubuntu-latest
    environment: changelog-approval
    outputs:
      old_version: ${{ steps.consolidate.outputs.old_version }}
      new_version: ${{ steps.consolidate.outputs.new_version }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.release_tag }}  # Checkout the tag being deployed
          fetch-depth: 0  # Need full history for CHANGELOG.md parsing
      
      - name: Find last deployment to ${{ inputs.environment }}
        id: find-last-deployment
        run: |
          echo "🔍 Finding last successful deployment to ${{ inputs.environment }}..."
          
          # Determine workflow file based on environment
          if [[ "${{ inputs.environment }}" == "stage" ]]; then
            WORKFLOW_FILE="deploy-stage.yml"
          elif [[ "${{ inputs.environment }}" == "prod" ]]; then
            WORKFLOW_FILE="deploy-prod.yml"
          else
            echo "❌ Invalid environment: ${{ inputs.environment }}"
            exit 1
          fi
          
          # Query GitHub API for last successful deployment using curl
          echo "🔎 Querying API: /repos/${{ github.repository }}/actions/workflows/${WORKFLOW_FILE}/runs"
          
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/${WORKFLOW_FILE}/runs?status=completed&conclusion=success&per_page=1")
          
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          
          echo "📊 HTTP Status: $HTTP_CODE"
          
          if [[ "$HTTP_CODE" != "200" ]]; then
            echo "⚠️  API request failed (HTTP $HTTP_CODE) - assuming first deployment"
            echo "Response: $BODY"
            echo "old_version=" >> $GITHUB_OUTPUT
            echo "is_first_deployment=true" >> $GITHUB_OUTPUT
          else
            LAST_RUN=$(echo "$BODY" | jq -r '.workflow_runs[0] // empty')
            
            if [[ -z "$LAST_RUN" || "$LAST_RUN" == "null" ]]; then
              echo "ℹ️  No previous deployment found to ${{ inputs.environment }}"
              echo "old_version=" >> $GITHUB_OUTPUT
              echo "is_first_deployment=true" >> $GITHUB_OUTPUT
            else
              # Extract release tag from run name (run-name is set to release_tag)
              RUN_NAME=$(echo "$LAST_RUN" | jq -r '.name // empty')
              echo "🔍 Last run name: $RUN_NAME"
              
              # Extract version using sed (more compatible than grep -P)
              OLD_TAG=$(echo "$RUN_NAME" | sed -n 's/.*\(v[0-9]\+\.[0-9]\+\.[0-9]\+\(-[^[:space:]]*\)\?\).*/\1/p')
              
              if [[ -z "$OLD_TAG" ]]; then
                echo "⚠️  Could not extract version from last deployment"
                echo "⚠️  Run name was: $RUN_NAME"
                echo "old_version=" >> $GITHUB_OUTPUT
                echo "is_first_deployment=true" >> $GITHUB_OUTPUT
              else
                echo "✅ Last deployment to ${{ inputs.environment }}: $OLD_TAG"
                echo "old_version=$OLD_TAG" >> $GITHUB_OUTPUT
                echo "is_first_deployment=false" >> $GITHUB_OUTPUT
              fi
            fi
          fi

      
      - name: Extract changelog sections
        id: extract-changelog
        if: steps.find-last-deployment.outputs.old_version != ''
        run: |
          # This step extracts changelog entries between two versions.
          # 
          # Normal case (same lineage): Both versions exist in CHANGELOG.md
          #   Example: v1.2.0 → v1.3.0 (both on main) = shows v1.3.0 changes
          # 
          # Divergent lineage: OLD version doesn't exist in NEW's CHANGELOG.md
          #   Example: v1.2.1 (hotfix) → v1.3.0 (main) = v1.3.0 CHANGELOG has no [1.2.1]
          #   Behavior: Shows all changes in v1.3.0's lineage + adds warning note
          #   Rationale: Hotfix changes should be backmerged separately to main
          # 
          # Hotfix-to-hotfix (same lineage): Both versions exist in CHANGELOG.md
          #   Example: v1.2.1 → v1.2.2 (both on hotfix branch) = shows v1.2.2 changes
          
          OLD_VERSION="${{ steps.find-last-deployment.outputs.old_version }}"
          NEW_VERSION="${{ inputs.release_tag }}"
          
          echo "📄 Extracting changelog from $OLD_VERSION to $NEW_VERSION..."
          
          # Check if CHANGELOG.md exists
          if [[ ! -f "CHANGELOG.md" ]]; then
            echo "❌ CHANGELOG.md not found"
            exit 1
          fi
          
          # Normalize versions (strip 'v' prefix for comparison)
          OLD_VERSION_NORMALIZED="${OLD_VERSION#v}"
          NEW_VERSION_NORMALIZED="${NEW_VERSION#v}"
          
          echo "🔍 Searching for versions: $OLD_VERSION_NORMALIZED to $NEW_VERSION_NORMALIZED"
          
          # Check if OLD version exists in NEW version's CHANGELOG.md (detect divergent lineages)
          OLD_EXISTS=$(grep -c "^## \[v\?${OLD_VERSION_NORMALIZED}\]" CHANGELOG.md || true)
          
          if [[ "$OLD_EXISTS" -eq 0 ]]; then
            echo "⚠️  Old version $OLD_VERSION not found in $NEW_VERSION CHANGELOG.md"
            echo "⚠️  This indicates divergent branch lineages (e.g., main-branch release after hotfix)"
            echo "📋 Will show all changes in $NEW_VERSION release lineage"
            DIVERGENT_LINEAGE="true"
          else
            DIVERGENT_LINEAGE="false"
          fi
          
          # Extract changelog between versions
          EXTRACTED=$(awk -v old="$OLD_VERSION_NORMALIZED" -v new="$NEW_VERSION_NORMALIZED" '
            BEGIN { 
              in_range=0
              found_new=0
              found_old=0
            }
            /^## \[/ {
              version = $0
              gsub(/^## \[v?/, "", version)
              gsub(/\].*$/, "", version)
              
              # Check if we hit the new version
              if (version == new) {
                found_new=1
                in_range=1
                print $0
                next
              }
              
              # Check if we hit the old version (stop extracting)
              if (version == old) {
                found_old=1
                in_range=0
                exit
              }
              
              # If in range, print the section
              if (in_range) {
                print $0
                next
              }
            }
            {
              if (in_range) {
                print $0
              }
            }
          ' CHANGELOG.md)
          
          # Add note for divergent lineages
          if [[ "$DIVERGENT_LINEAGE" == "true" && -n "$EXTRACTED" ]]; then
            EXTRACTED="${EXTRACTED}

---
**Note:** Previous deployment ($OLD_VERSION) was from a different branch lineage (e.g., hotfix). This shows all changes in the $NEW_VERSION release lineage. If hotfix changes should persist, they must be backmerged separately."
          fi
          
          if [[ -z "$EXTRACTED" ]]; then
            echo "⚠️  No changelog entries found between $OLD_VERSION and $NEW_VERSION"
            echo "⚠️  This might be a redeploy of the same version"
            EXTRACTED="No new changes since $OLD_VERSION"
          fi
          
          # Save to file (handle multiline)
          echo "$EXTRACTED" > /tmp/changelog_extract.md
          
          echo "✅ Changelog extracted successfully"
          echo "extracted_content<<EOF" >> $GITHUB_OUTPUT
          cat /tmp/changelog_extract.md >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      
      - name: Consolidate and update release notes
        id: consolidate
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NEW_VERSION="${{ inputs.release_tag }}"
          OLD_VERSION="${{ steps.find-last-deployment.outputs.old_version }}"
          IS_FIRST="${{ steps.find-last-deployment.outputs.is_first_deployment }}"
          ENVIRONMENT="${{ inputs.environment }}"
          
          echo "📦 Updating release notes for $NEW_VERSION..."
          
          # Get current release body
          CURRENT_BODY=$(gh release view "$NEW_VERSION" --json body -q .body 2>/dev/null || echo "")
          
          if [[ -z "$CURRENT_BODY" ]]; then
            echo "❌ Release $NEW_VERSION not found"
            exit 1
          fi
          
          # Build consolidated section
          if [[ "$IS_FIRST" == "true" || -z "$OLD_VERSION" ]]; then
            # First deployment to this environment
            HEADER="## 📦 Pending Deployment to ${ENVIRONMENT} | Initial Deployment"
            echo "${HEADER}" > /tmp/consolidated_section.md
            echo "" >> /tmp/consolidated_section.md
            echo "This is the first deployment to ${ENVIRONMENT}." >> /tmp/consolidated_section.md
            OLD_VERSION="initial"
          else
            # Normal deployment with version range
            HEADER="## 📦 Pending Deployment to ${ENVIRONMENT} | ${OLD_VERSION} → ${NEW_VERSION}"
            
            CHANGELOG_CONTENT=$(cat /tmp/changelog_extract.md 2>/dev/null || echo "No changes extracted")
            
            echo "${HEADER}" > /tmp/consolidated_section.md
            echo "" >> /tmp/consolidated_section.md
            echo "${CHANGELOG_CONTENT}" >> /tmp/consolidated_section.md
          fi
          
          # Append to release body
          echo "${CURRENT_BODY}" > /tmp/release_body.md
          echo "" >> /tmp/release_body.md
          echo "---" >> /tmp/release_body.md
          echo "" >> /tmp/release_body.md
          cat /tmp/consolidated_section.md >> /tmp/release_body.md
          
          # Update release notes
          gh release edit "$NEW_VERSION" --notes-file /tmp/release_body.md
          
          echo "✅ Release notes updated with pending deployment section"
          echo "old_version=$OLD_VERSION" >> $GITHUB_OUTPUT
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          
          # Output summary
          echo "### 📦 Changelog Consolidated" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment**: ${ENVIRONMENT}" >> $GITHUB_STEP_SUMMARY
          echo "**Version Range**: ${OLD_VERSION} → ${NEW_VERSION}" >> $GITHUB_STEP_SUMMARY
          echo "**Status**: Pending Deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "[View Release Notes](https://github.com/${{ github.repository }}/releases/tag/${NEW_VERSION})" >> $GITHUB_STEP_SUMMARY
