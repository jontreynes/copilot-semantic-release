name: Deploy to Production

run-name: "${{ github.event.client_payload.release_tag || inputs.release_tag || 'triggered' }}"

on:
  repository_dispatch:
    types: [deploy-prod]  # Triggered by deploy-stage workflow
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to deploy (e.g., v1.2.3)'
        required: true
        type: string

jobs:
  get-release-tag:
    name: Determine Release Tag
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.get-tag.outputs.tag }}
    steps:
      - name: Get Release Tag
        id: get-tag
        run: |
          if [[ "${{ github.event_name }}" == "repository_dispatch" ]]; then
            echo "tag=${{ github.event.client_payload.release_tag }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "tag=${{ inputs.release_tag }}" >> $GITHUB_OUTPUT
          fi
  
  deploy:
    name: Deploy
    needs: get-release-tag
    uses: ./.github/workflows/deploy-template.yml
    with:
      environment: 'prod'
      release_tag: ${{ needs.get-release-tag.outputs.release_tag }}
      next_environment: ''  # No next environment - production is final
    secrets: inherit
  
  promote-release:
    name: Promote Release to Latest
    needs: [get-release-tag, deploy]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Promote to latest
        run: |
          echo "🎉 Promoting release to latest..."
          echo "Looking for release tag: ${{ needs.get-release-tag.outputs.release_tag }}"
          
          # Fetch releases and show what we got
          RELEASES=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/releases")
          
          echo "Available releases:"
          echo "$RELEASES" | jq -r '.[].tag_name'
          
          RELEASE_ID=$(echo "$RELEASES" | jq -r '.[] | select(.tag_name=="${{ needs.get-release-tag.outputs.release_tag }}") | .id')
          
          if [ -z "$RELEASE_ID" ]; then
            echo "❌ Error: Release not found for tag ${{ needs.get-release-tag.outputs.release_tag }}"
            exit 1
          fi
          
          echo "Found release ID: $RELEASE_ID"
          
          curl -f -X PATCH \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/releases/${RELEASE_ID}" \
            -d '{"draft":false,"prerelease":false,"make_latest":"true"}'
          
          echo "✅ Release promoted to latest"
