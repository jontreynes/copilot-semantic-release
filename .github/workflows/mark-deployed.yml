name: Mark Deployment Complete

on:
  workflow_call:
    inputs:
      release_tag:
        description: 'Release tag that was deployed'
        required: true
        type: string
      environment:
        description: 'Target environment name (stage or prod)'
        required: true
        type: string
      old_version:
        description: 'Previous version deployed to environment'
        required: false
        type: string
        default: ''
      new_version:
        description: 'New version that was deployed'
        required: false
        type: string
        default: ''

permissions:
  contents: write

jobs:
  mark-deployed:
    name: Mark ${{ inputs.release_tag }} as Deployed to ${{ inputs.environment }}
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Update release notes with deployed status
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x .github/scripts/update-deployment-status.sh
          .github/scripts/update-deployment-status.sh \
            "${{ inputs.release_tag }}" \
            "${{ inputs.environment }}" \
            "${{ inputs.old_version }}" \
            "${{ inputs.new_version }}" \
            "${{ github.repository }}"
