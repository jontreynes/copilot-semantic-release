name: Release

run-name: "${{ github.event.head_commit.message || github.event.commits[0].message || 'Manual Release' }}"

on:
  push:
    branches:
      - main
  workflow_dispatch: # Manual trigger for hotfix releases
    inputs:
      environment:
        description: 'Deployment environment'
        required: false
        default: 'dev'
        type: choice
        options:
          - dev
          - stage
          - prod

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  build-and-release:
    name: Build Artifacts and Create Release
    runs-on: ubuntu-latest
    
    env:
      DRY_RUN_MODE: 'false' # for quick testing. to not create actual releases, set to 'true'
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: false

      - name: Setup Node.js (for semantic-release)
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build release artifacts
        id: build
        run: |
          echo "Creating release artifact bundle..."
          
          # Create artifact directory
          mkdir -p release-artifacts
          
          # Build the action only if esbuild is installed
          if [ -f "esbuild.cjs" ] && npm list esbuild >/dev/null 2>&1; then
            echo "Building with esbuild..."
            npm run build
          else
            echo "Skipping build - esbuild not available or not needed"
          fi
          
          # Create tarball of deployable code
          tar -czf release-artifacts/github-action-release.tar.gz \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='release-artifacts' \
            --exclude='*.log' \
            .
          
          # Create deployment manifest
          cat > release-artifacts/deployment-manifest.json <<EOF
          {
            "build_time": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "commit_sha": "${{ github.sha }}",
            "branch": "${{ github.ref_name }}",
            "workflow_run_id": "${{ github.run_id }}",
            "node_version": "$(node --version)",
            "npm_version": "$(npm --version)",
            "artifact_checksum": "$(sha256sum release-artifacts/github-action-release.tar.gz | cut -d' ' -f1)"
          }
          EOF
          
          echo "artifact_path=release-artifacts/github-action-release.tar.gz" >> $GITHUB_OUTPUT
          echo "manifest_path=release-artifacts/deployment-manifest.json" >> $GITHUB_OUTPUT

      - name: Install semantic-release dependencies
        run: npm ci

      - name: Create semantic release
        id: semantic
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 1. Capture all output to file
          DRY_RUN_FLAG=""
          if [[ "${{ env.DRY_RUN_MODE }}" == "true" ]]; then
            DRY_RUN_FLAG="--dry-run"
            echo "🧪 DRY RUN MODE - No release will be created"
          fi
          
          npx semantic-release $DRY_RUN_FLAG > release-output.txt 2>&1 || true
          
          # 2. Check if release was published
          if grep -q "Published release" release-output.txt; then
            # 3. Get version from package.json (semantic-release updates this before creating release)
            # This is the most reliable source of truth for the version
            VERSION="v$(node -p "require('./package.json').version")"
            
            # 4. Make it available to other steps
            echo "release_version=$VERSION" >> $GITHUB_OUTPUT
            echo "release_created=true" >> $GITHUB_OUTPUT
            echo "✅ Release created: $VERSION"
          else
            if [[ "${{ env.DRY_RUN_MODE }}" == "true" ]]; then
              # Default version for dry-run testing to trigger deployment workflow
              VERSION="v1.3.0"
              echo "release_version=$VERSION" >> $GITHUB_OUTPUT
              echo "release_created=true" >> $GITHUB_OUTPUT
              echo "🧪 DRY RUN: Using test version $VERSION to trigger deployment"
            else
              echo "release_created=false" >> $GITHUB_OUTPUT
              echo "ℹ️ No release created (no semantic commits found)"
            fi
          fi
          
          cat release-output.txt

      - name: Mark draft as prerelease
        if: steps.semantic.outputs.release_created == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "📝 Marking release as prerelease (visible, not latest)..."
          
          gh release edit ${{ steps.semantic.outputs.release_version }} \
            --repo ${{ github.repository }} \
            --draft=false \
            --prerelease \
            --latest=false
          
          echo "🔍 Verifying release state..."
          gh release view ${{ steps.semantic.outputs.release_version }} \
            --repo ${{ github.repository }} \
            --json isDraft,isPrerelease,name,tagName
          
          echo "✅ Release marked as prerelease"

      - name: Trigger deployment
        if: steps.semantic.outputs.release_created == 'true'
        run: |
          # Default deployment target
          DEPLOY_TARGET="dev"
          
          # Check if this is a manual workflow dispatch with target environment 
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            # Manual hotfix with target environment
            DEPLOY_TARGET="${{ inputs.environment }}"
            echo "🎯 Manual deployment target: $DEPLOY_TARGET"
          else
            # Automatic push to main or hotfix/* - always goes to dev first
            echo "🔄 Automatic deployment - targeting dev environment"
          fi
          
          echo "🚀 Triggering $DEPLOY_TARGET deployment for ${{ steps.semantic.outputs.release_version }}"
          
          # Dispatch to appropriate deployment workflow
          case "$DEPLOY_TARGET" in
            "stage")
              EVENT_TYPE="deploy-stage"
              ;;
            "prod"|"production")
              EVENT_TYPE="deploy-prod"
              ;;
            *)
              EVENT_TYPE="deploy-dev"
              ;;
          esac
          
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "${{ github.api_url }}/repos/${{ github.repository }}/dispatches" \
            -d "{\"event_type\":\"$EVENT_TYPE\",\"client_payload\":{\"release_tag\":\"${{ steps.semantic.outputs.release_version }}\"}}"
          
          echo "✅ Triggered $EVENT_TYPE event for release ${{ steps.semantic.outputs.release_version }}"

      - name: Summary
        if: always()
        run: |
          echo "## Release Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [[ "${{ steps.semantic.outputs.release_created }}" == "true" ]]; then
            echo "✅ **Release Created**: ${{ steps.semantic.outputs.release_version }}" >> $GITHUB_STEP_SUMMARY
            echo "📦 **Artifact**: github-action-release.tar.gz" >> $GITHUB_STEP_SUMMARY
            echo "🚀 **GitHub Release**: Available for download" >> $GITHUB_STEP_SUMMARY
          else
            echo "ℹ️ **No Release**: No semantic commits found (feat, fix, BREAKING CHANGE)" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Commits must follow conventional commits format:" >> $GITHUB_STEP_SUMMARY
            echo "- \`feat: add new feature\` - creates minor release" >> $GITHUB_STEP_SUMMARY
            echo "- \`fix: bug fix\` - creates patch release" >> $GITHUB_STEP_SUMMARY
            echo "- \`feat!: breaking change\` - creates major release" >> $GITHUB_STEP_SUMMARY
          fi
